 <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
 <!-- Права частина - Фіксований термінал зі скролом -->
            <div class="lg:col-span-5 mt-12 lg:mt-0">
                <div class="rounded-3xl overflow-hidden border border-zinc-700 shadow-2xl">
                    <!-- Термінал заголовок -->
                    <div class="bg-zinc-900 px-6 py-3 flex items-center gap-3 border-b border-zinc-700">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                            <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                        </div>
                        <div class="text-zinc-400 text-sm ml-4 font-medium">email@bilohash.com — SSH — project init</div>
                    </div>
                    
                    <!-- Фіксований термінал з скролом -->
                    <div class="bg-zinc-950 p-6 md:p-8 font-mono text-base md:text-lg leading-relaxed overflow-hidden" 
                         style="height: 380px;">
                        <div id="terminal-output" 
                             class="text-emerald-400 text-left whitespace-pre-wrap overflow-y-auto h-full pr-4 custom-scroll">
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<script>
const terminalLines = [
    "Я НЕ ПИШУ САЙТИ ДЛЯ -Р УЗЬКИХ! СЛІД ЗА КОРАБЛЕМ 🚢",
    "",
    "$ php artisan make:project --full-power",
    "✓ Ініціалізую структуру проекту з чистої архітектури...",
    "✓ Створюю кастомну модульну CMS з нуля...",
    "✓ Будую потужну адмін-панель з ролями, правами та аудитом...",
    "✓ Налаштовую Redis-кешування та черги для блискавичної швидкості...",
    "✓ Додаю повну багатомовну підтримку (UA, NO, EN, LT)...",
    "✓ Інтегрую зовнішні сервіси: PayPal, Stripe, Revolut, Nova Poshta...",
    "✓ Оптимізую під Core Web Vitals 98+ та ідеальну Lighthouse оцінку...",
    "✓ Накладаю багатошарову безпеку, CSRF, XSS-захист та автоматичні бекапи...",
    "✓ Додаю сучасний UI/UX з анімаціями та glassmorphism ефектами...",
    "",
    "✅ Проект успішно ініціалізовано!",
    "Ваш сайт готовий до запуску на максимальній потужності ✨",
    "",
    "Ruslan Bilohash — коджу не просто швидко, а правильно."
];

let lineIndex = 0;
const outputElement = document.getElementById('terminal-output');

function printTerminal() {
    if (lineIndex < terminalLines.length) {
        const line = terminalLines[lineIndex];
        
        if (line === "") {
            outputElement.innerHTML += "<br>";
        } else {
            outputElement.innerHTML += line + "<br>";
        }
        
        outputElement.scrollTop = outputElement.scrollHeight;
        
        lineIndex++;
        setTimeout(printTerminal, 700); // трохи повільніше для драматичності
    } else {
        // Повтор циклу після довшої паузи
        setTimeout(() => {
            outputElement.innerHTML = '';
            lineIndex = 0;
            printTerminal();
        }, 6000);
    }
}

// Запуск
window.addEventListener('load', printTerminal);
</script>

<style>
/* Кастомний скрол для терміналу */
.custom-scroll::-webkit-scrollbar {
    width: 6px;
}
.custom-scroll::-webkit-scrollbar-thumb {
    background-color: #10b981;
    border-radius: 20px;
}
.custom-scroll::-webkit-scrollbar-track {
    background: #1f2937;
}
</style>
